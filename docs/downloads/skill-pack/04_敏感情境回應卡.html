<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>敏感情境回應卡 | 《我們的島》引導師共學分享</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body class="card-deck-page">
  <header class="site-header">
    <a class="brand" href="../../index.html#download">
      <span class="brand-mark">島</span>
      <span>《我們的島》引導師共學分享</span>
    </a>
    <nav aria-label="主要導覽">
      <a href="../../index.html#download">技能包下載</a>
      <a href="../../index.html#path">共學路徑</a>
      <a href="../../index.html#feedback">推廣回饋</a>
    </nav>
  </header>

  <main class="deck-shell">
    <section class="deck-heading">
      <p class="eyebrow">Sensitive Scenario Cards</p>
      <h1>敏感情境回應卡</h1>
      <p>在敏感、高張力或卡住的時刻，幫助引導者先穩住現場、接住感受，再把對話帶回理解、修復與行動。</p>
    </section>

    <section class="slide-frame" aria-live="polite">
      <article class="scenario-card" id="scenario-card">
        <div class="card-topline">
          <span id="card-kicker">說明</span>
          <span id="card-count">1 / 14</span>
        </div>
        <h2 id="card-title">為什麼稱為「敏感情境」</h2>
        <div class="card-body" id="card-body"></div>
        <div class="card-learning" id="card-learning"></div>
      </article>
    </section>

    <div class="deck-controls" aria-label="卡片控制">
      <button type="button" class="button" id="prev-card">上一張</button>
      <div class="deck-dots" id="deck-dots" aria-label="卡片進度"></div>
      <button type="button" class="button primary" id="next-card">下一張</button>
    </div>

    <div class="deck-note">
      <p>投影提示：可用鍵盤左右鍵切換卡片。純文字版仍保留，方便下載、列印或複製改寫。</p>
      <a href="04_敏感情境回應卡.md">查看純文字版</a>
    </div>
  </main>

  <script>
    const cards = [
      {
        kicker: '說明',
        title: '為什麼稱為「敏感情境」',
        body: [
          '在反歧視與霸凌議題的討論中，參與者可能會說出玩笑、貼標籤、指責、沉默、防衛，或觸及自己曾經受傷的經驗。',
          '這些情況本身不一定代表有人做錯，但如果沒有被好好承接，可能讓被歧視者再次受傷，也可能讓班級或團體陷入責備、對立或沉默。'
        ],
        learning: '敏感情境不是把人視為問題，而是提醒引導者放慢速度、照顧情緒、釐清影響，維持安全對話。'
      },
      {
        kicker: '使用方式',
        title: '三步驟回應',
        body: [
          '1. 先接住：我聽見你說...',
          '2. 再打開：我們可以一起想想...',
          '3. 帶回學習：這其實很像遊戲裡的...'
        ],
        learning: '若現場已經出現受傷、憤怒、沉默或防衛，先照顧人，再回到課程。'
      },
      {
        kicker: '情境 1',
        title: '學生說「我又不是故意的，為什麼說我歧視？」',
        body: [
          '我聽見你在意的是，你沒有想傷害別人。這很重要。',
          '我們今天不是要找壞人，而是一起練習看見影響。有些話即使不是故意，還是可能讓別人受傷。',
          '我們可以一起想想：如果一句話讓別人不舒服，下一次我可以怎麼說，會更尊重也更清楚？'
        ],
        learning: '關鍵不是「你是不是壞人」，而是「我的話造成了什麼影響」。'
      },
      {
        kicker: '情境 2',
        title: '學生一直開玩笑，無法進入情境',
        body: [
          '我知道這些角色名稱和故事設定會讓人覺得好玩，笑一下很正常。',
          '但我想請大家停一下，看看故事裡正在發生什麼：有人因為一句話受傷，有人覺得自己沒有被理解，也有人想解決問題卻不知道怎麼做。',
          '我們可以繼續玩，但請把笑聲帶回角色任務：你們這一組要怎麼讓事情變好？'
        ],
        learning: '遊戲可以好玩，但不是把受傷的人變成玩笑。'
      },
      {
        kicker: '情境 3',
        title: '學生說「這只是遊戲，幹嘛那麼認真？」',
        body: [
          '你說得對，這是一個遊戲。',
          '也正因為它是遊戲，我們才有機會在比較安全的地方練習。很多真實生活中的衝突，當下其實很難停下來想。',
          '所以不是要你假裝很沉重，而是邀請你認真看看遊戲讓我們看見什麼。'
        ],
        learning: '遊戲不是現實，但遊戲可以幫我們練習理解現實。'
      },
      {
        kicker: '情境 4',
        title: '彩虹繪師那組沉默，不太願意表達',
        body: [
          '我注意到你們這組比較安靜，沒關係，不一定要馬上說出完整答案。',
          '你們可以先用一句話說：這個角色現在最在意的是什麼？或者先寫下來，再請一位代表念出其中一點。',
          '如果現在還不想說，也可以先聽聽其他組，等一下再補充。'
        ],
        learning: '沉默也可能是一種訊息。老師可以降低表達門檻，而不是逼學生立刻說。'
      },
      {
        kicker: '情境 5',
        title: '學生互相怪罪',
        body: [
          '我聽到你們很想找出問題在哪裡，這代表大家很投入。',
          '但我們先暫停一下，不急著說「都是誰的錯」。我們試著換一個問題：這個結果是哪些選擇一起造成的？',
          '如果只找一個壞人，事情可能不會真的變好。'
        ],
        learning: '反歧視不是找壞人，而是看見系統、關係與選擇如何一起造成影響。'
      },
      {
        kicker: '情境 6',
        title: '學生說「他們太玻璃心了吧」',
        body: [
          '我聽見你覺得這個反應好像太強烈。',
          '我們可以一起想一件事：如果一個人只聽到一次，可能覺得還好；但如果他從小到大一直聽到類似的話，感受會不會不一樣？',
          '遊戲裡的彩虹族不是只面對一句話，而是面對很多長期累積的經驗。'
        ],
        learning: '有些傷害不是單一句話造成，而是長期累積造成。'
      },
      {
        kicker: '情境 7',
        title: '學生說「原住民本來就很會唱歌/運動啊」',
        body: [
          '你提到的是一種很常見的印象。',
          '我們可以一起想想：如果這句話被當成稱讚，為什麼有時候仍然可能讓人不舒服？',
          '我們可以欣賞一個人的能力，但不要把某個能力變成整個族群都應該有的標籤。'
        ],
        learning: '正向刻板印象仍然可能成為壓力。'
      },
      {
        kicker: '情境 8',
        title: '學生情緒低落，說自己以前也被這樣對待過',
        body: [
          '謝謝你願意說出來。聽起來那是一個不容易的經驗。',
          '你不需要現在把所有細節都說出來，也不需要一個人承受。等一下如果你願意，我可以陪你聊，或一起找你信任的老師/輔導老師。',
          '現在我們先確認你此刻需不需要休息一下，或希望同學怎麼陪你。'
        ],
        learning: '真實經驗出現時，優先照顧人，再回到課程。'
      },
      {
        kicker: '情境 9',
        title: '學生不願意投入角色',
        body: [
          '如果你現在還不太知道怎麼扮演，沒關係。',
          '你可以先做一件小事：從角色卡裡找出這個角色最在意的一句話。接下來討論時，你只要幫這個角色把那句話說清楚。',
          '不需要演得很誇張，只要先試著站在他的立場想一分鐘。'
        ],
        learning: '投入角色不等於表演，先理解立場即可。'
      },
      {
        kicker: '情境 10',
        title: '討論離題',
        body: [
          '我先暫停大家一下。',
          '剛剛的討論很熱烈，但我們好像離開了今天的會議目標。請大家一起看回來：我們現在要處理的是依闊群島的歧視問題，有沒有方法讓大家都更好？',
          '每組請用一句話說：你們下一步要提出什麼具體做法？'
        ],
        learning: '當學生離題時，不急著責備，回到遊戲目標與下一步任務。'
      },
      {
        kicker: '情境 11',
        title: '學生提出「直接立法處罰就好了」',
        body: [
          '這是一個很直接的解決方式，也代表你們很想讓傷害停止。',
          '我們可以再多想一步：立法可以處理什麼？又有什麼是立法不一定處理得到的？',
          '有沒有可能同時需要規範、教育、對話和支持？'
        ],
        learning: '讓學生看見制度處理與關係修復的差異。'
      },
      {
        kicker: '情境 12',
        title: '學生說「如果我是彩虹族，我就不要理他們」',
        body: [
          '這是一種保護自己的方式，也很能理解。',
          '我們也可以想想：如果一個人或一群人只能靠切斷關係來保護自己，代表原本的環境出了什麼問題？',
          '遊戲裡的橋不只是交通，也像人與人的信任。當橋斷掉，誰會受到影響？'
        ],
        learning: '把個人反應帶回關係與系統層次。'
      }
    ];

    const kicker = document.getElementById('card-kicker');
    const count = document.getElementById('card-count');
    const title = document.getElementById('card-title');
    const body = document.getElementById('card-body');
    const learning = document.getElementById('card-learning');
    const dots = document.getElementById('deck-dots');
    const prev = document.getElementById('prev-card');
    const next = document.getElementById('next-card');
    let current = 0;

    cards.forEach((_, index) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.setAttribute('aria-label', `前往第 ${index + 1} 張`);
      button.addEventListener('click', () => showCard(index));
      dots.appendChild(button);
    });

    function showCard(index) {
      current = (index + cards.length) % cards.length;
      const card = cards[current];
      kicker.textContent = card.kicker;
      count.textContent = `${current + 1} / ${cards.length}`;
      title.textContent = card.title;
      body.innerHTML = card.body.map(text => `<p>${text}</p>`).join('');
      learning.innerHTML = `<strong>帶回學習</strong><p>${card.learning}</p>`;
      [...dots.children].forEach((dot, dotIndex) => {
        dot.classList.toggle('active', dotIndex === current);
      });
    }

    prev.addEventListener('click', () => showCard(current - 1));
    next.addEventListener('click', () => showCard(current + 1));
    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft') showCard(current - 1);
      if (event.key === 'ArrowRight') showCard(current + 1);
    });

    showCard(0);
  </script>
</body>
</html>
